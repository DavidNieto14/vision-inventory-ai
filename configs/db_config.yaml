# ── Configuración de Base de Datos SQLite ────────────────────────────────────

database:
  path: data/inventory.db
  timeout: 30                    # segundos de espera para adquirir el lock

tables:
  detections: detections
  sessions: sessions

export:
  csv_dir: data/exports
  date_format: "%Y-%m-%d %H:%M:%S"
